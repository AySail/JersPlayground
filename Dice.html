<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🎲 Advanced Dice Roller</title>

  <!-- STYLES: Controls layout, colors, animations -->
  <style>
    /* Base body styles: centers content and applies background */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Dark mode styles */
    body.dark-mode {
      background-color: #121212;
      color: #eee;
    }

    /* Main title */
    h1 {
      font-size: 2.8rem;
      margin-bottom: 15px;
      text-align: center;
    }

    /* Container for dice and controls */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 500px;
    }

    /* Dice container - flex wrap for multiple dice */
    #diceContainer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
      min-height: 120px;
    }

    /* Each dice emoji style */
    .dice {
      font-size: 6rem;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 15px;
      background-color: #fff;
      box-shadow: 0 3px 10px rgb(0 0 0 / 0.15);
      user-select: none;
      transition: transform 0.3s ease;
      cursor: default;
    }

    /* Dice animation while rolling */
    .rolling {
      animation: roll 0.7s ease-in-out;
    }

    @keyframes roll {
      0% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(20deg) scale(1.1); }
      50% { transform: rotate(-20deg) scale(1.05); }
      75% { transform: rotate(15deg) scale(1.1); }
      100% { transform: rotate(0deg) scale(1); }
    }

    /* Controls container */
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
      width: 100%;
    }

    /* Number input for dice count */
    label {
      font-size: 1rem;
      margin-right: 8px;
    }

    input[type="number"] {
      width: 60px;
      padding: 5px 8px;
      font-size: 1rem;
      border: 2px solid #007acc;
      border-radius: 6px;
      outline-offset: 2px;
      transition: border-color 0.2s ease;
    }

    input[type="number"]:focus {
      border-color: #005fa3;
    }

    /* Buttons style */
    button {
      padding: 10px 22px;
      font-size: 1.1rem;
      background-color: #007acc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    button:hover,
    button:focus {
      background-color: #005fa3;
      outline: none;
    }

    /* Stats and totals */
    .stats {
      font-size: 1.1rem;
      margin-top: 10px;
      text-align: center;
      min-height: 2.2rem;
    }

    /* Roll history list */
    #history {
      margin-top: 20px;
      max-height: 150px;
      overflow-y: auto;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 8px;
      background-color: #fff;
      padding: 10px;
      font-size: 0.9rem;
      color: #333;
    }

    /* Dark mode adjustments */
    body.dark-mode #history {
      background-color: #1e1e1e;
      border-color: #444;
      color: #ddd;
    }

    /* Scrollbar style for history */
    #history::-webkit-scrollbar {
      width: 6px;
    }
    #history::-webkit-scrollbar-thumb {
      background-color: #007acc;
      border-radius: 3px;
    }

    /* Dark mode toggle container */
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 15px;
    }

    /* Small checkboxes */
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* Responsive tweaks */
    @media (max-width: 480px) {
      .dice {
        font-size: 4.5rem;
        width: 60px;
        height: 60px;
      }
      button {
        font-size: 1rem;
        padding: 8px 16px;
      }
    }
  </style>
</head>
<body>

  <!-- Main Title -->
  <h1>🎲 Advanced Dice Roller</h1>

  <div class="container" role="main">

    <!-- Controls: Number of dice, roll & reset buttons, sound & dark mode toggles -->
    <div class="controls" aria-label="Dice roller controls">

      <!-- Number of dice to roll -->
      <label for="numDice">Number of dice:</label>
      <input
        type="number"
        id="numDice"
        name="numDice"
        min="1"
        max="6"
        value="1"
        aria-describedby="numDiceDesc"
      />
      <span id="numDiceDesc" class="sr-only">Choose between 1 and 6 dice</span>

      <!-- Roll button -->
      <button id="rollBtn" aria-label="Roll the dice">Roll Dice</button>

      <!-- Reset button -->
      <button id="resetBtn" aria-label="Reset roll history and counts">Reset</button>
    </div>

    <!-- Toggle switches for sound and dark mode -->
    <div class="toggle-container">
      <input type="checkbox" id="soundToggle" checked />
      <label for="soundToggle">Sound</label>

      <input type="checkbox" id="darkModeToggle" />
      <label for="darkModeToggle">Dark Mode</label>
    </div>

    <!-- Container for displaying dice -->
    <div id="diceContainer" aria-live="polite" aria-atomic="true" aria-relevant="additions"></div>

    <!-- Display total sum of dice rolled -->
    <div class="stats" id="totalSum" aria-live="polite" aria-atomic="true">
      Total Sum: 0
    </div>

    <!-- Roll history showing last 10 rolls -->
    <section aria-label="Roll history">
      <h2 style="font-size: 1.2rem; margin-top: 30px;">Roll History (Last 10)</h2>
      <ul id="history" aria-live="polite" aria-atomic="false" role="list"></ul>
    </section>

    <!-- Sound element for dice rolling -->
    <audio
      id="diceSound"
      src="https://www.soundjay.com/button/sounds/button-16.mp3"
      preload="auto"
      aria-hidden="true"
    ></audio>

  </div>

  <!-- SCRIPT: Dice logic, event handlers, and enhancements -->
  <script>
    // Unicode dice faces from 1 to 6
    const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

    // DOM elements
    const diceContainer = document.getElementById('diceContainer');
    const totalSumDisplay = document.getElementById('totalSum');
    const rollBtn = document.getElementById('rollBtn');
    const resetBtn = document.getElementById('resetBtn');
    const numDiceInput = document.getElementById('numDice');
    const historyList = document.getElementById('history');
    const diceSound = document.getElementById('diceSound');
    const soundToggle = document.getElementById('soundToggle');
    const darkModeToggle = document.getElementById('darkModeToggle');
    const body = document.body;

    let rollHistory = []; // Array to hold last rolls (max 10)

    // Helper: Generate random integer from 1 to 6 inclusive
    function rollSingleDice() {
      return Math.floor(Math.random() * 6) + 1;
    }

    // Render dice faces with rolling animation
    function displayDice(values) {
      diceContainer.innerHTML = ''; // Clear old dice

      values.forEach((value) => {
        const diceEl = document.createElement('div');
        diceEl.classList.add('dice', 'rolling');
        diceEl.textContent = diceFaces[value - 1];
        diceContainer.appendChild(diceEl);
      });

      // Remove animation class after animation ends
      // so it can be retriggered next roll
      setTimeout(() => {
        const diceEls = diceContainer.querySelectorAll('.dice');
        diceEls.forEach((el) => el.classList.remove('rolling'));
      }, 700);
    }

    // Update total sum display
    function updateTotalSum(sum) {
      totalSumDisplay.textContent = `Total Sum: ${sum}`;
    }

    // Update roll history list, show last 10 rolls
    function updateHistory(rolls, sum) {
      // Create a string representing the roll (e.g. ⚄ ⚁ ⚂ = 12)
      const rollStr = rolls.map(v => diceFaces[v - 1]).join(' ');
      const li = document.createElement('li');
      li.textContent = `${rollStr} = ${sum}`;
      historyList.prepend(li);

      // Keep only last 10 entries
      while (historyList.childNodes.length > 10) {
        historyList.removeChild(historyList.lastChild);
      }
    }

    // Main dice rolling function
    function rollDice() {
      // Validate number of dice input (between 1 and 6)
      let count = parseInt(numDiceInput.value, 10);
      if (isNaN(count) || count < 1) count = 1;
      if (count > 6) count = 6;
      numDiceInput.value = count;

      // Roll dice
      const rolls = [];
      for (let i = 0; i < count; i++) {
        rolls.push(rollSingleDice());
      }

      // Show dice with animation
      displayDice(rolls);

      // Calculate sum
      const sum = rolls.reduce((acc, val) => acc + val, 0);
      updateTotalSum(sum);

      // Play sound if enabled
      if (soundToggle.checked) {
        diceSound.currentTime = 0;
        diceSound.play();
      }

      // Update history
      rollHistory.unshift({ rolls, sum });
      if (rollHistory.length > 10) rollHistory.pop();
      updateHistory(rolls, sum);
    }

    // Reset the dice roller stats and history
    function resetAll() {
      rollHistory = [];
      diceContainer.innerHTML = '';
      updateTotalSum(0);
      historyList.innerHTML = '';
      numDiceInput.value = 1;
    }

    // Event listeners
    rollBtn.addEventListener('click', rollDice);
    resetBtn.addEventListener('click', resetAll);

    // Allow Enter key to roll dice when focused on number input
    numDiceInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        rollDice();
        rollBtn.focus();
      }
    });

    // Dark mode toggle listener
    darkModeToggle.addEventListener('change', () => {
      if (darkModeToggle.checked) {
        body.classList.add('dark-mode');
      } else {
        body.classList.remove('dark-mode');
      }
    });

    // Accessibility: Hide elements visually but keep readable by screen readers
    const style = document.createElement('style');
    style.textContent = `
      .sr-only {
        position: absolute !important;
        width: 1px !important;
        height: 1px !important;
        padding: 0 !important;
        margin: -1px !important;
        overflow: hidden !important;
        clip: rect(0,0,0,0) !important;
        white-space: nowrap !important;
        border: 0 !important;
      }
    `;
    document.head.appendChild(style);

    // Initialize with one dice displayed
    resetAll();

  </script>

</body>
</html>
