<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🎨 Paint Party</title>
  <style>
    /* Basic styles for layout and appearance */
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
      overflow-x: auto;
    }

    h1 {
      margin-bottom: 15px;
    }

    /* Canvas styles */
    #canvas {
      border: 2px solid #333;
      background: white;
      touch-action: none;
      cursor: crosshair;
      image-rendering: pixelated;
      display: block;
      margin-bottom: 10px;
      width: 1200px;
      height: 800px;
    }

    /* Optional grid background */
    #canvas.grid {
      background-image:
        linear-gradient(to right, #ccc 1px, transparent 1px),
        linear-gradient(to bottom, #ccc 1px, transparent 1px);
      background-size: 10px 10px;
    }

    /* Controls styling */
    .controls {
      margin: 10px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    button, input[type=color], select, input[type=range] {
      padding: 8px 12px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    button:hover, select:hover, input[type=range]:hover {
      background-color: #007acc;
      color: white;
    }

    input[type=color] {
      width: 40px;
      height: 40px;
      padding: 0;
    }

    label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }

    .colorPreset {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      box-shadow: 0 0 2px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .colorPreset:hover {
      transform: scale(1.2);
    }

    #brushSizeDisplay {
      font-weight: bold;
      width: 30px;
      text-align: center;
    }

    #message {
      font-size: 0.9rem;
      color: #555;
      margin-top: 10px;
      height: 20px;
    }
  </style>
</head>
<body>

<h1>🎨 Paint Party</h1>

<!-- Drawing canvas -->
<canvas id="canvas"></canvas>

<!-- Main controls -->
<div class="controls">
  <label>Color:
    <input type="color" id="colorPicker" value="#000000" />
  </label>

  <label>Brush:
    <input type="range" id="brushSize" min="1" max="50" value="10" />
    <span id="brushSizeDisplay">10</span>px
  </label>

  <label>Tool:
    <select id="toolSelect">
      <option value="brush">Brush</option>
      <option value="eraser">Eraser</option>
      <option value="rect">Rectangle</option>
      <option value="circle">Circle</option>
      <option value="fill">Fill</option>
    </select>
  </label>

  <button id="undoBtn">Undo</button>
  <button id="redoBtn">Redo</button>
  <button id="clearBtn">Clear</button>
  <button id="saveBtn">Save</button>
  <button id="gridToggleBtn">Toggle Grid</button>
</div>

<!-- Color preset buttons -->
<div class="controls">
  <button class="colorPreset" style="background: #000000"></button>
  <button class="colorPreset" style="background: #FF0000"></button>
  <button class="colorPreset" style="background: #00FF00"></button>
  <button class="colorPreset" style="background: #0000FF"></button>
  <button class="colorPreset" style="background: #FFFF00"></button>
  <button class="colorPreset" style="background: #FFA500"></button>
  <button class="colorPreset" style="background: #800080"></button>
  <button class="colorPreset" style="background: #FFFFFF"></button>
</div>

<div id="message"></div>

<!-- Main JavaScript logic -->
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // High-DPI canvas fix
  function fixDPI() {
    const dpi = window.devicePixelRatio || 1;
    const width = 1200;
    const height = 800;
    canvas.width = width * dpi;
    canvas.height = height * dpi;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpi, dpi);
  }
  fixDPI();

  // UI Elements
  const colorPicker = document.getElementById('colorPicker');
  const brushSize = document.getElementById('brushSize');
  const brushSizeDisplay = document.getElementById('brushSizeDisplay');
  const toolSelect = document.getElementById('toolSelect');
  const undoBtn = document.getElementById('undoBtn');
  const redoBtn = document.getElementById('redoBtn');
  const clearBtn = document.getElementById('clearBtn');
  const saveBtn = document.getElementById('saveBtn');
  const gridToggleBtn = document.getElementById('gridToggleBtn');
  const message = document.getElementById('message');

  // Drawing state
  let isDrawing = false;
  let startX, startY;
  let tool = toolSelect.value;
  let currentColor = colorPicker.value;
  let currentSize = brushSize.value;
  const undoStack = [];
  const redoStack = [];

  // Save current canvas state for undo
  function saveState() {
    undoStack.push(canvas.toDataURL());
    if (undoStack.length > 50) undoStack.shift();
    redoStack.length = 0;
  }

  // Restore a state from undo/redo
  function restoreState(stackFrom, stackTo) {
    if (stackFrom.length) {
      stackTo.push(canvas.toDataURL());
      const img = new Image();
      img.src = stackFrom.pop();
      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width / (window.devicePixelRatio || 1), canvas.height / (window.devicePixelRatio || 1));
      };
    }
  }

  // Get mouse or touch position relative to canvas
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX || e.touches[0].clientX) - rect.left;
    const y = (e.clientY || e.touches[0].clientY) - rect.top;
    return { x, y };
  }

  // Flood fill algorithm for paint bucket
  function floodFill(x, y, fillColor) {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const w = imageData.width;
    const h = imageData.height;
    const stack = [[x, y]];
    const start = (y * w + x) * 4;
    const target = data.slice(start, start + 4);
    const [r, g, b] = hexToRGB(fillColor);

    function match(i) {
      return data[i] === target[0] && data[i+1] === target[1] &&
             data[i+2] === target[2] && data[i+3] === target[3];
    }

    while (stack.length) {
      const [px, py] = stack.pop();
      if (px < 0 || px >= w || py < 0 || py >= h) continue;
      const i = (py * w + px) * 4;
      if (!match(i)) continue;

      data[i] = r; data[i+1] = g; data[i+2] = b; data[i+3] = 255;

      stack.push([px+1, py], [px-1, py], [px, py+1], [px, py-1]);
    }

    ctx.putImageData(imageData, 0, 0);
  }

  // Convert hex color to RGB
  function hexToRGB(hex) {
    const r = parseInt(hex.substr(1, 2), 16);
    const g = parseInt(hex.substr(3, 2), 16);
    const b = parseInt(hex.substr(5, 2), 16);
    return [r, g, b];
  }

  // Event listeners for canvas
  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('touchmove', draw, { passive: false });
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('touchend', endDraw);

  // Start drawing
  function startDraw(e) {
    e.preventDefault();
    isDrawing = true;
    saveState();
    const { x, y } = getPos(e);
    startX = x;
    startY = y;

    if (tool === 'fill') {
      floodFill(Math.floor(x), Math.floor(y), currentColor);
      isDrawing = false;
    }
  }

  // Draw while moving mouse/touch
  function draw(e) {
    if (!isDrawing) return;
    const { x, y } = getPos(e);

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = tool === 'eraser' ? '#FFFFFF' : currentColor;
    ctx.lineWidth = currentSize;

    if (tool === 'brush' || tool === 'eraser') {
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(x, y);
      ctx.stroke();
      [startX, startY] = [x, y];
    }
  }

  // End drawing
  function endDraw(e) {
    if (!isDrawing) return;
    isDrawing = false;
    const { x, y } = getPos(e);

    const width = x - startX;
    const height = y - startY;

    ctx.strokeStyle = currentColor;
    ctx.lineWidth = currentSize;

    if (tool === 'rect') {
      ctx.strokeRect(startX, startY, width, height);
    } else if (tool === 'circle') {
      const radius = Math.sqrt(width ** 2 + height ** 2);
      ctx.beginPath();
      ctx.arc(startX, startY, radius, 0, 2 * Math.PI);
      ctx.stroke();
    }
  }

  // Update tool and brush settings
  toolSelect.addEventListener('change', () => tool = toolSelect.value);
  colorPicker.addEventListener('input', () => currentColor = colorPicker.value);
  brushSize.addEventListener('input', () => {
    currentSize = brushSize.value;
    brushSizeDisplay.textContent = currentSize;
  });

  // Undo and redo buttons
  undoBtn.addEventListener('click', () => restoreState(undoStack, redoStack));
  redoBtn.addEventListener('click', () => restoreState(redoStack, undoStack));

  // Clear canvas
  clearBtn.addEventListener('click', () => {
    saveState();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });

  // Save canvas as image
  saveBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'painting.png';
    link.href = canvas.toDataURL();
    link.click();
  });

  // Toggle grid background
  gridToggleBtn.addEventListener('click', () => {
    canvas.classList.toggle('grid');
  });

  // Color preset buttons
  document.querySelectorAll('.colorPreset').forEach(btn => {
    btn.addEventListener('click', () => {
      currentColor = btn.style.backgroundColor;
      colorPicker.value = rgbToHex(currentColor);
    });
  });

  // Convert RGB to hex string
  function rgbToHex(rgb) {
    const result = rgb.match(/\d+/g).map(n => (+n).toString(16).padStart(2, '0'));
    return `#${result.join('')}`;
  }
</script>
</body>
</html>
