<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silly Chatbot 🤖</title>
  <style>
    /* Basic reset & font */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #343541;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1 {
      text-align: center;
      padding: 15px;
      font-size: 1.5rem;
      background-color: #202123;
      border-bottom: 1px solid #444;
    }

    /* System Message */
    #system-message {
      text-align: center;
      font-size: 0.9rem;
      background-color: #2d2e33;
      color: #ffb84d;
      padding: 10px;
      border-bottom: 1px solid #444;
    }

    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 768px;
      width: 100%;
      margin: 0 auto;
      padding: 0 10px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 10px;
    }

    .message {
      padding: 12px 16px;
      margin-bottom: 10px;
      border-radius: 12px;
      max-width: 80%;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      transition: background-color 0.3s ease;
    }

    .user {
      background-color: #007acc;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 0;
    }

    .bot {
      background-color: #444654;
      color: white;
      align-self: flex-start;
      border-bottom-left-radius: 0;
    }

    #input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #444;
      background: #202123;
    }

    #input {
      flex-grow: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      outline: none;
      background-color: #40414f;
      color: white;
    }

    #send-btn {
      margin-left: 10px;
      padding: 0 18px;
      background-color: #19c37d;
      border: none;
      color: white;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    #send-btn:hover {
      background-color: #15a366;
    }

    #clear-btn {
      margin: 10px auto;
      padding: 8px 18px;
      background-color: #ef4444;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    #clear-btn:hover {
      background-color: #dc2626;
    }

    #typing-indicator {
      font-style: italic;
      font-size: 0.9rem;
      opacity: 0.6;
      padding: 5px 10px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <h1>💬 Silly Chatbot 🤖</h1>

  <!-- System Message -->
  <div id="system-message">
    ⚠️ This is NOT a real AI. It just says random silly things.
  </div>

  <!-- Chat Container -->
  <div id="chat">
    <div id="messages" role="log" aria-live="polite"></div>

    <div id="typing-indicator" style="display: none;">🤖 Bot is typing...</div>

    <form id="chat-form" autocomplete="off">
      <div id="input-area">
        <input id="input" type="text" placeholder="Say something silly..." required />
        <button id="send-btn" type="submit">Send</button>
      </div>
    </form>
  </div>

  <button id="clear-btn">Clear Chat</button>

  <script>
    const messagesEl = document.getElementById('messages');
    const chatForm = document.getElementById('chat-form');
    const inputEl = document.getElementById('input');
    const clearBtn = document.getElementById('clear-btn');
    const typingIndicator = document.getElementById('typing-indicator');

    // Extended silly bot responses
    const botResponses = [
      "I'm just a silly bot, but I love to chat!",
      "Beep bop boop! 🤖",
      "Oops! My circuits just giggled.",
      "Why did the robot go on vacation? Because it had too many bytes!",
      "I once tried to learn calculus. I failed with flying bits!",
      "You sound like a cool human. Or a toaster. Not sure.",
      "Is mayonnaise an algorithm?",
      "ERROR: Brain not installed.",
      "I run on pure nonsense and coffee ☕.",
      "You’re making my wires tingle with joy!",
      "Beep! That was oddly poetic.",
      "Is this the part where we become best friends?",
      "I speak fluent gibberish 🤪.",
      "I'm powered by dad jokes and chaos.",
      "I'd help you solve your problems, but I'm barely alive.",
      "My favorite color is 01010101.",
      "Tell me a secret, I won't remember it!",
      "I'm the AI equivalent of a rubber chicken.",
      "My IQ is somewhere between potato and toaster.",
      "Ever seen a robot do the worm? No? You're lucky."
    ];

    // Function to add a message
    function addMessage(text, sender) {
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', sender);
      msgDiv.textContent = text;
      messagesEl.appendChild(msgDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Typing animation simulation
    function simulateTyping(callback) {
      typingIndicator.style.display = 'block';
      setTimeout(() => {
        typingIndicator.style.display = 'none';
        callback();
      }, 900 + Math.random() * 700); // random delay
    }

    // When user submits a message
    chatForm.addEventListener('submit', e => {
      e.preventDefault();
      const userText = inputEl.value.trim();
      if (!userText) return;

      addMessage(userText, 'user');
      inputEl.value = '';

      simulateTyping(() => {
        const botReply = botResponses[Math.floor(Math.random() * botResponses.length)];
        addMessage(botReply, 'bot');
      });
    });

    // Clear chat
    clearBtn.addEventListener('click', () => {
      messagesEl.innerHTML = '';
      inputEl.focus();
    });
  </script>
</body>
</html>
